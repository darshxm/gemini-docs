name: Update Docs

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Sync docs
        run: python main.py

      - name: Validate
        run: |
          ruff check .
          ruff format --check .
          python -m compileall gemini_docs main.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No doc updates"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gemini_docs/markdown gemini_docs/docs
          git commit -m "Update mirrored Gemini docs"

      - name: Push changes
        run: |
          if git diff --quiet HEAD origin/${{ github.ref_name }}; then
            echo "Nothing to push"
            exit 0
          fi
          git push
