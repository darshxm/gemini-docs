name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Compile
        run: python -m compileall gemini_docs main.py

      - name: Smoke test
        run: |
          python -c "from gemini_docs import get_document, list_documents; assert list_documents(); assert get_document('text-generation') is not None"
          python -c "from gemini_docs.mcp_server import server; print(server.name)"
